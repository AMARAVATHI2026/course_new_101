<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Courses</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Available Courses</h2>

<div class="row">

<div class="col-md-4 mb-4" th:each="course : ${courses}">

<div class="card shadow">

<div class="card-body">

<h5 th:text="${course.title}"></h5>

<p th:text="${course.description}"></p>

<p><b>Instructor:</b> <span th:text="${course.instructor}"></span></p>

<p><b>Price:</b> ₹<span th:text="${course.price}"></span></p>

<button class="btn btn-primary">Enroll</button>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
